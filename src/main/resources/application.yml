spring:
  application:
    name: DigitalCampus

  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/DigitalCampus?currentSchema=public
    username: postgres
    password: 123456

  jpa:
    # 关键：使用标准 PostgreSQL 方言
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    hibernate:
      ddl-auto: update
    show-sql: true
mybatis:
  configuration:
    map-underscore-to-camel-case: true
